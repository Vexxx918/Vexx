<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vexx Website</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    min-height:100vh;

    display:flex;
    flex-direction:column;
    align-items:center;

    font-family:Arial, sans-serif;
    color:white;
    text-align:center;

    background-image:url("pokemon.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
}

h1{
    margin-top:20px;
    font-size:55px;
    font-weight:bold;
    text-shadow:
        0 0 10px rgba(0,0,0,0.8),
        0 0 20px rgba(0,0,0,0.6);
}

p{
    margin-top:20px;
    font-size:28px;
    text-shadow:
        0 0 10px rgba(0,0,0,0.8);
}

.login-btn{
    margin-top:40px;

    display:inline-block;
    padding:15px 55px;

    background:linear-gradient(
        90deg,
        #ffcb05,
        #ff9500
    );

    color:#000;
    text-decoration:none;
    font-size:22px;
    font-weight:bold;

    border-radius:50px;

    box-shadow:
        0 0 20px rgba(255,203,5,0.8);

    transition:0.3s;
}

.login-btn:hover{
    transform:scale(1.05);

    box-shadow:
        0 0 30px rgba(255,203,5,1);
}

</style>
</head>

<body>

<h1>SELAMAT DATANG DI DUNIA POKEMON</h1>

<p>沒錢沒用</p>

<a href="login.html" class="login-btn">
    LOGIN
</a>

</body>
</html>
