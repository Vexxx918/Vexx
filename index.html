<!DOCTYPE html>
<html>
<head>
    <title>Vexx Website</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            text-align:center;
            color:white;

            background:linear-gradient(
                rgba(0,0,0,0.6),
                rgba(0,0,0,0.6)
            ),
            url('https://images.unsplash.com/photo-1510511459019-5dda7724fd87');

            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
            min-height:100vh;
        }

        h1{
            padding-top:150px;
            font-size:48px;
            text-shadow:2px 2px 8px black;
        }

        p{
            font-size:20px;
            text-shadow:1px 1px 5px black;
            margin-bottom:40px;
        }

        .login-btn{
            display:inline-block;
            padding:15px 50px;
            background:linear-gradient(90deg,#00c6ff,#0072ff);
            color:white;
            text-decoration:none;
            border-radius:50px;
            font-size:20px;
            font-weight:bold;
            box-shadow:0 0 20px rgba(0,114,255,.7);
            transition:0.3s;
        }

        .login-btn:hover{
            transform:scale(1.05);
            box-shadow:0 0 30px rgba(0,114,255,1);
        }
    </style>
</head>

<body>

    <h1>SELAMAT DATANG DI DUNIA TIPUAN</h1>

    <p>Website sedang dalam pengembangan.</p>

    <a href="login.html" class="login-btn">LOGIN</a>

</body>
</html>
