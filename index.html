<!DOCTYPE html>
<html>
<head>
    <title>Vexx Website</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            text-align:center;
            color:white;

            background:linear-gradient(
                rgba(0,0,0,0.5),
                rgba(0,0,0,0.5)
            ),
            url('https://images.unsplash.com/photo-1510511459019-5dda7724fd87');

            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
            min-height:100vh;
        }

        .pokemon{
            width:450px;
            max-width:90%;
            margin-top:40px;
            animation:float 3s ease-in-out infinite;
            filter:drop-shadow(0 0 20px rgba(255,255,255,.6));
        }

        @keyframes float{
            0%{
                transform:translateY(0);
            }

            50%{
                transform:translateY(-15px);
            }

            100%{
                transform:translateY(0);
            }
        }

        h1{
            font-size:48px;
            text-shadow:2px 2px 8px black;
            margin-top:20px;
        }

        p{
            font-size:20px;
            text-shadow:1px 1px 5px black;
            margin-bottom:40px;
        }

        .login-btn{
            display:inline-block;
            padding:15px 50px;
            background:linear-gradient(90deg,#ffcb05,#ff9500);
            color:black;
            text-decoration:none;
            border-radius:50px;
            font-size:20px;
            font-weight:bold;
            box-shadow:0 0 20px rgba(255,203,5,.8);
            transition:0.3s;
        }

        .login-btn:hover{
            transform:scale(1.05);
            box-shadow:0 0 30px rgba(255,203,5,1);
        }
    </style>
</head>

<body>

    <img src="pokemon.png" alt="Pokemon" class="pokemon">

    <h1>SELAMAT DATANG DI DUNIA TIPUAN</h1>

    <p>沒錢沒用</p>

    <a href="login.html" class="login-btn">LOGIN</a>

</body>
</html>
