<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vexx Website</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    font-family:Arial,sans-serif;
    color:white;
    text-align:center;

    background-image:url("pokemon.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;

    transition:0.5s;
}

/* HALAMAN AWAL */

h1{
    margin-top:20px;
    font-size:55px;
    text-shadow:0 0 10px rgba(0,0,0,.8);
}

#teksUtama{
    margin-top:20px;
    font-size:28px;
}

.login-btn{
    margin-top:40px;
    padding:15px 55px;
    border:none;
    border-radius:50px;
    background:linear-gradient(90deg,#ffcb05,#ff9500);
    color:black;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
}

/* STATISTIK */

.stats-box{
    margin-top:40px;
    width:550px;
    max-width:90%;
    background:rgba(0,0,0,.65);
    backdrop-filter:blur(8px);
    border-radius:20px;
    padding:25px;
}

.stats-box h2{
    color:#ffcb05;
    margin-bottom:20px;
}

.chart{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.bar{
    height:45px;
    border-radius:30px;
    display:flex;
    align-items:center;
    padding-left:15px;
    font-weight:bold;
}

.hp{
    width:90%;
    background:#4CAF50;
}

.attack{
    width:75%;
    background:#ff5722;
}

.defense{
    width:65%;
    background:#2196F3;
}

.speed{
    width:85%;
    background:#ffcb05;
    color:black;
}

/* LOGIN */

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.7);
    justify-content:center;
    align-items:center;
}

.login-box{
    width:380px;
    background:#1f1f1f;
    padding:30px;
    border-radius:20px;
}

.login-box h2{
    color:#ffcb05;
    margin-bottom:20px;
}

.login-box input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
}

.submit-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:50px;
    background:linear-gradient(90deg,#ffcb05,#ff9500);
    font-weight:bold;
    cursor:pointer;
}

.close-btn{
    margin-top:10px;
    background:none;
    border:none;
    color:white;
    cursor:pointer;
}

#error{
    margin-top:10px;
    color:red;
}

/* MENU SETELAH LOGIN */

.menu-bebas{
    display:none;
    margin-top:100px;
    width:500px;
    max-width:90%;
}

.menu-btn{
    width:100%;
    padding:20px;
    border:none;
    border-radius:15px;
    background:linear-gradient(90deg,#ffcb05,#ff9500);
    color:black;
    font-size:24px;
    font-weight:bold;
    cursor:pointer;
}

.content-box{
    display:none;
    margin-top:20px;
    width:600px;
    max-width:90%;
    background:white;
    color:black;
    padding:30px;
    border-radius:20px;
}

.content-box h2{
    margin-bottom:15px;
}

</style>
</head>

<body>

<h1 id="judulUtama" style="color: #87CEFA;">
SELAMAT DATANG DI DUNIA POKEMON
</h1>

<p id="teksUtama">
沒錢沒用
</p>

<button
id="btnLogin"
class="login-btn"
onclick="openLogin()">
LOGIN
</button>

<div id="statsBox" class="stats-box">

<h2>STATISTIK POKEMON</h2>

<div class="chart">

<div class="bar hp">HP 90%</div>

<div class="bar attack">ATTACK 75%</div>

<div class="bar defense">DEFENSE 65%</div>

<div class="bar speed">SPEED 85%</div>

</div>

</div>

<!-- MENU LOGIN BERHASIL -->

<div id="menuBebas" class="menu-bebas">

<button
class="menu-btn"
onclick="showContent()">

BEBAS ISI APAPUN

</button>
</div>
    
</div>

<!-- POPUP LOGIN -->

<div class="modal" id="loginModal">

<div class="login-box">

<h2>LOGIN POKEMON</h2>

<input
type="text"
id="userid"
placeholder="Masukkan ID">

<input
type="password"
id="password"
placeholder="Masukkan Password">

<button
class="submit-btn"
onclick="login()">

MASUK

</button>

<button
class="close-btn"
onclick="closeLogin()">

Tutup

</button>

<p id="error"></p>

</div>

</div>

<script>

function openLogin(){
    document.getElementById("loginModal").style.display="flex";
}

function closeLogin(){
    document.getElementById("loginModal").style.display="none";
}

function login(){

    let id=document.getElementById("userid").value;
    let pass=document.getElementById("password").value;

    if(id==="admin" && pass==="12345"){

        closeLogin();

        document.getElementById("judulUtama").style.display="none";
        document.getElementById("teksUtama").style.display="none";
        document.getElementById("btnLogin").style.display="none";
        document.getElementById("statsBox").style.display="none";

        document.body.style.backgroundImage="none";
        document.body.style.backgroundColor="#87CEEB";

        document.getElementById("menuBebas").style.display="block";

    }else{

        document.getElementById("error").innerHTML=
        "ID atau Password Salah!";

    }
}

function showContent(){
    document.getElementById("contentBox").style.display = "block";
}

</script>

</body>
</html>
