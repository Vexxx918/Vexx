<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Pokemon</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;

    background:url("pokemon.jpg") center/cover no-repeat;
}

.login-box{
    width:380px;
    background:rgba(0,0,0,0.8);
    padding:30px;
    border-radius:20px;
    text-align:center;
    color:white;
}

.login-box h2{
    margin-bottom:20px;
    color:#ffcb05;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:50px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.login-btn{
    background:linear-gradient(90deg,#ffcb05,#ff9500);
    color:black;
}

.ganti-btn{
    margin-top:10px;
    background:#2196F3;
    color:white;
    display:none;
}

#error{
    margin-top:10px;
    color:red;
}

#sukses{
    color:#4CAF50;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="login-box">

    <h2>LOGIN DI SINI</h2>

    <input
    type="text"
    id="userid"
    placeholder="Masukkan ID">

    <input
    type="password"
    id="password"
    placeholder="Masukkan Password">

    <button
    class="login-btn"
    onclick="login()">
    LOGIN
    </button>

    <button
    id="gantiPasswordBtn"
    class="ganti-btn"
    onclick="gantiPassword()">
    GANTI PASSWORD
    </button>

    <p id="error"></p>
    <p id="sukses"></p>

</div>

<script>

let passwordBenar = "12345";

function login(){

    let id = document.getElementById("userid").value;
    let pass = document.getElementById("password").value;

    if(id === "admin" && pass === passwordBenar){

        document.getElementById("error").innerHTML = "";
        document.getElementById("sukses").innerHTML =
        "Login Berhasil!";

    }else{

        document.getElementById("error").innerHTML =
        "ID atau Password Salah!";

        document.getElementById("gantiPasswordBtn").style.display =
        "block";
    }
}

function gantiPassword(){

    let passwordBaru =
    prompt("Masukkan Password Baru:");

    if(passwordBaru && passwordBaru.trim() !== ""){

        passwordBenar = passwordBaru;

        alert("Password berhasil diganti!");

        document.getElementById("gantiPasswordBtn").style.display =
        "none";

        document.getElementById("error").innerHTML = "";
    }
}

</script>

</body>
</html>
