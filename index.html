<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Pokemon</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Arial,sans-serif;
    background:url("pokemon.jpg") center/cover no-repeat;
}

/* LOGIN */

.login-box{
    width:380px;
    background:rgba(0,0,0,0.8);
    padding:30px;
    border-radius:20px;
    text-align:center;
    color:white;
}

.login-box h2{
    margin-bottom:20px;
    color:#ffcb05;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:50px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.login-btn{
    background:linear-gradient(90deg,#ffcb05,#ff9500);
    color:black;
}

.ganti-btn{
    margin-top:10px;
    background:#2196F3;
    color:white;
    display:none;
}

#error{
    color:red;
    margin-top:10px;
}

#sukses{
    color:#4CAF50;
    margin-top:10px;
}

/* MENU */

.menu-bebas{
    display:none;
    width:95%;
    max-width:1200px;
    margin-top:30px;
}

.menu-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    text-align:center;
    cursor:pointer;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card h3{
    color:#ff9500;
}

.content-box{
    display:none;
    margin-top:20px;
    background:white;
    color:black;
    padding:25px;
    border-radius:15px;
}
</style>
</head>

<body>

<div class="login-box" id="loginBox">

    <h2>LOGIN DI SINI</h2>

    <input
    type="text"
    id="userid"
    placeholder="Masukkan ID">

    <input
    type="password"
    id="password"
    placeholder="Masukkan Password">

    <button
    class="login-btn"
    onclick="login()">
    LOGIN
    </button>

    <button
    id="gantiPasswordBtn"
    class="ganti-btn"
    onclick="gantiPassword()">
    GANTI PASSWORD
    </button>

    <p id="error"></p>
    <p id="sukses"></p>

</div>

<!-- MENU SETELAH LOGIN -->

<div id="menuBebas" class="menu-bebas">

    <div class="menu-grid">

        <div class="card" onclick="showContent(1)">
            <h3>Judul 1</h3>
        </div>

        <div class="card" onclick="showContent(2)">
            <h3>Judul 2</h3>
        </div>

        <div class="card" onclick="showContent(3)">
            <h3>Judul 3</h3>
        </div>

        <div class="card" onclick="showContent(4)">
            <h3>Judul 4</h3>
        </div>

        <div class="card" onclick="showContent(5)">
            <h3>Judul 5</h3>
        </div>

        <div class="card" onclick="showContent(6)">
            <h3>Judul 6</h3>
        </div>

        <div class="card" onclick="showContent(7)">
            <h3>Judul 7</h3>
        </div>

        <div class="card" onclick="showContent(8)">
            <h3>Judul 8</h3>
        </div>

        <div class="card" onclick="showContent(9)">
            <h3>Judul 9</h3>
        </div>

        <div class="card" onclick="showContent(10)">
            <h3>Judul 10</h3>
        </div>

        <div class="card" onclick="showContent(11)">
            <h3>Judul 11</h3>
        </div>

        <div class="card" onclick="showContent(12)">
            <h3>Judul 12</h3>
        </div>

    </div>

    <div id="contentBox" class="content-box"></div>

</div>

<script>

let passwordBenar = "12345";

function login(){

    let id = document.getElementById("userid").value;
    let pass = document.getElementById("password").value;

    if(id === "admin" && pass === passwordBenar){

        document.getElementById("loginBox").style.display = "none";

        document.getElementById("menuBebas").style.display = "block";

    }else{

        document.getElementById("error").innerHTML =
        "ID atau Password Salah!";

        document.getElementById("gantiPasswordBtn").style.display =
        "block";
    }
}

function gantiPassword(){

    let passwordBaru =
    prompt("Masukkan Password Baru:");

    if(passwordBaru && passwordBaru.trim() !== ""){

        passwordBenar = passwordBaru;

        alert("Password berhasil diganti!");

        document.getElementById("gantiPasswordBtn").style.display =
        "none";

        document.getElementById("error").innerHTML = "";
    }
}

function showContent(menu){

    const data = {

        1:"Isi Menu 1",
        2:"Isi Menu 2",
        3:"Isi Menu 3",
        4:"Isi Menu 4",

        5:"Isi Menu 5",
        6:"Isi Menu 6",
        7:"Isi Menu 7",
        8:"Isi Menu 8",

        9:"Isi Menu 9",
        10:"Isi Menu 10",
        11:"Isi Menu 11",
        12:"Isi Menu 12"

    };

    document.getElementById("contentBox").innerHTML = `
        <h2>Judul ${menu}</h2>
        <p>${data[menu]}</p>
    `;

    document.getElementById("contentBox").style.display = "block";
}

</script>

</body>
</html>
