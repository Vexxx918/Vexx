<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Pokemon</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Arial,sans-serif;
    /* Ganti 'pokemon.jpg' dengan nama file gambar latar belakang Anda yang sebenarnya */
    background:url("image_1.png") center/cover no-repeat;
    position: relative; /* Penting untuk pemosisian tombol */
}

/* LOGIN */

.login-box{
    width:380px;
    background:rgba(0,0,0,.8);
    padding:30px;
    border-radius:20px;
    text-align:center;
    color:white;
}

.login-box h2{
    color:#ffcb05;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:50px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.login-btn{
    background:linear-gradient(90deg,#ffcb05,#ff9500);
    color:black;
}

/* --- PERUBAHAN CSS TOMBOL KELUAR --- */
.menu-header {
    width: 100%;
    display: flex;
    justify-content: flex-end; /* Mengatur konten ke arah kanan */
    margin-bottom: 15px;
    position: absolute; /* Membuat tombol keluar tetap di pojok */
    top: 20px; /* Jarak dari atas */
    right: 20px; /* Jarak dari kanan */
    z-index: 10; /* Pastikan tombol di atas elemen lain */
}

.logout-btn{
    background:#e53935;
    color:white;
    width: auto; /* Agar tombol tidak melebar penuh */
    padding: 12px 30px; /* Memberikan ruang di dalam tombol */
}
/* ----------------------------------- */

.ganti-btn{
    display:none;
    margin-top:10px;
    background:#2196F3;
    color:white;
}

#error{
    color:red;
    margin-top:10px;
}

/* MENU */

.menu-bebas{
    display:none;
    width:95%;
    max-width:1200px;
    margin-top:20px;
}

.menu-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    text-align:center;
    cursor:pointer;
}

.card h3{
    color:#ff9500;
}

.content-box{
    display:none;
    margin-top:20px;
    background:white;
    padding:20px;
    border-radius:15px;
}

textarea{
    width:100%;
    height:180px;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
    resize:none;
}

.save-btn{
    background:#4CAF50;
    color:white;
}

</style>

</head>

<body>

<div class="login-box" id="loginBox">

<h2>LOGIN DI SINI</h2>

<input type="text"
id="userid"
placeholder="Masukkan ID">

<input type="password"
id="password"
placeholder="Masukkan Password"
onkeydown="if(event.key==='Enter'){login();}">

<button class="login-btn" onclick="login()">LOGIN</button>

<button id="gantiPasswordBtn"
class="ganti-btn"
onclick="gantiPassword()">
GANTI PASSWORD
</button>

<p id="error"></p>

</div>

<div id="menuBebas" class="menu-bebas">

<div class="menu-header">
    <button class="logout-btn" onclick="logout()">KELUAR</button>
</div>

<div class="menu-grid">

    <div class="card" onclick="showContent(1)"><h3>PENARIKAN TANGGAL HITUNGAN TO</h3></div>
    <div class="card" onclick="showContent(2)"><h3>REQ GAMBAR</h3></div>
    <div class="card" onclick="showContent(3)"><h3>REQ GAMBAR ZENJITU</h3></div>
    <div class="card" onclick="showContent(4)"><h3>SCRIPT QRIS GARUDA</h3></div>

    <div class="card" onclick="showContent(5)"><h3>Judul 5</h3></div>
    <div class="card" onclick="showContent(6)"><h3>Judul 6</h3></div>
    <div class="card" onclick="showContent(7)"><h3>Judul 7</h3></div>
    <div class="card" onclick="showContent(8)"><h3>Judul 8</h3></div>

    <div class="card" onclick="showContent(9)"><h3>Judul 9</h3></div>
    <div class="card" onclick="showContent(10)"><h3>Judul 10</h3></div>
    <div class="card" onclick="showContent(11)"><h3>Judul 11</h3></div>
    <div class="card" onclick="showContent(12)"><h3>Judul 12</h3></div>

</div>

<div id="contentBox" class="content-box">

    <h2 id="menuTitle">Menuhttp://googleusercontent.com/image_generation_content/0
